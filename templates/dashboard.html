<!DOCTYPE html>
<html>
<head>
    <title>Unified Threat Detection Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
            padding: 20px;
            transition: 0.3s;
        }
        .risk-box {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            color: white;
        }
        .log-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .title {
            font-weight: bold;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .dark-mode {
            background-color: #1e1e1e !important;
            color: white !important;
        }
        .dark-mode .log-box {
            background-color: #2c2c2c !important;
        }
        #healthLine {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="title">Unified Threat Detection Dashboard</div>
        <div class="d-flex align-items-center">
            <button id="monitorBtn" class="btn btn-primary me-3" onclick="toggleMonitor()">Start Monitor</button>
            <button class="btn btn-warning me-3" onclick="resetRisk()">Reset Risk Score</button>
            <button class="btn btn-dark me-3" onclick="toggleTheme()">🌙 Dark Mode</button>
            <span id="statusBadge" class="badge bg-danger p-2">MONITOR STOPPED</span>
        </div>
    </div>

    <!-- RISK SCORE BOX -->
    <div id="riskSection" class="risk-box mb-4">
        Loading risk score...
    </div>

    <!-- SYSTEM HEALTH LINE -->
    <div id="healthLine">Loading system health...</div>

    <!-- RISK CHART -->
    <div class="log-box mb-4">
        <h5>Risk Score Trend (Last 20 Events)</h5>
        <canvas id="riskChart"></canvas>
    </div>

    <!-- EVENT LOGS -->
    <div class="log-box">
        <h5>Recent Event Logs</h5>
        <button class="btn btn-success btn-sm mb-3" onclick="downloadCSV()">Download Logs as CSV</button>

        <table class="table table-striped mt-2">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Event</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

</div>

<!-- Toast Container (IMPORTANT!) -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
    <div id="toastContainer"></div>
</div>

<!-- Sound -->
<audio id="alertSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_19b3b91b69.mp3"></audio>


<script>

/* ------------------------- DARK MODE ------------------------- */
function toggleTheme() {
    document.body.classList.toggle("dark-mode");
}

/* ------------------------- RISK CHART ------------------------- */
let riskData = [];
let timeLabels = [];

const riskCtx = document.getElementById('riskChart').getContext('2d');

const riskChart = new Chart(riskCtx, {
    type: "line",
    data: {
        labels: timeLabels,
        datasets: [{
            label: "Risk Score",
            data: riskData,
            borderColor: "#dc3545",
            borderWidth: 2,
            tension: 0.3
        }]
    },
    options: {
        responsive: true
    }
});

function updateRiskChart(score) {
    let now = new Date().toLocaleTimeString();

    timeLabels.push(now);
    riskData.push(score);

    if (riskData.length > 20) {
        timeLabels.shift();
        riskData.shift();
    }

    riskChart.update();
}

/* ------------------------- SYSTEM HEALTH (LINE TEXT) ------------------------- */
/* ------------------------- SYSTEM HEALTH (LINE TEXT) ------------------------- */

let lastNetworkBytes = 0;   // Store previous total bytes
let lastCheckTime = Date.now();

function updateSystemHealth() {
    fetch("/api/system_health")
    .then(r => r.json())
    .then(data => {

        if (data.error) {
            document.getElementById("healthLine").innerText = "Error loading system health.";
            return;
        }

        // --- Calculate KB/s ---
        let nowBytes = data.network;
        let nowTime = Date.now();

        let timeDiffSec = (nowTime - lastCheckTime) / 1000; // time difference in seconds
        let speedKBps = 0;

        if (lastNetworkBytes !== 0 && timeDiffSec > 0) {
            speedKBps = ((nowBytes - lastNetworkBytes) / 1024) / timeDiffSec;
        }

        lastNetworkBytes = nowBytes;
        lastCheckTime = nowTime;

        document.getElementById("healthLine").innerHTML = `
            CPU: <span class="text-primary">${data.cpu}%</span> |
            RAM: <span class="text-success">${data.ram}%</span> |
            Net: <span class="text-danger">${speedKBps.toFixed(2)} KB/s</span>
        `;
    });
}

/* ------------------------- TOAST ALERT ------------------------- */
function showAlertToast(msg) {
    const toastHTML = `
        <div class="toast text-white bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    `;

    let container = document.getElementById("toastContainer");
    container.insertAdjacentHTML("beforeend", toastHTML);

    let toast = new bootstrap.Toast(container.lastElementChild);
    toast.show();
}

/* ------------------------- START / STOP MONITOR ------------------------- */
function toggleMonitor() {
    let btn = document.getElementById("monitorBtn");

    if (btn.innerText === "Start Monitor") {
        fetch("/api/start_monitor", { method: "POST" })
        .then(r => r.json())
        .then(data => {
            if (data.status === "started") {
                btn.innerText = "Stop Monitor";
                updateMonitorBadge(true);
            }
        });
    } else {
        fetch("/api/stop_monitor", { method: "POST" })
        .then(r => r.json())
        .then(data => {
            if (data.status === "stopped") {
                btn.innerText = "Start Monitor";
                updateMonitorBadge(false);
            }
        });
    }
}

function updateMonitorBadge(isRunning) {
    let badge = document.getElementById("statusBadge");
    badge.className = isRunning ? "badge bg-success p-2" : "badge bg-danger p-2";
    badge.innerText = isRunning ? "Monitoring Active" : "MONITOR STOPPED";
}

/* ------------------------- RESET RISK ------------------------- */
function resetRisk() {
    fetch("/api/reset_risk", { method: "POST" })
    .then(r => r.json())
    .then(data => {
        if (data.status === "reset") {
            showAlertToast("✔ Risk score reset to SAFE");
            updateRisk();
        }
    })
    .catch(err => {
        showAlertToast("❌ Reset failed: " + err);
    });
}

/* ------------------------- UPDATE RISK ------------------------- */
function updateRisk() {
    fetch("/api/risk")
    .then(r => r.json())
    .then(data => {
        let box = document.getElementById("riskSection");

        box.innerHTML = `
            <strong>Risk Score:</strong> ${data.score.toFixed(1)}<br>
            <strong>Level:</strong> ${data.level}
        `;

        if (data.level === "Safe") box.style.background = "#28a745";
        else if (data.level === "Low") box.style.background = "#17a2b8";
        else if (data.level === "Medium") box.style.background = "#ffc107";
        else if (data.level === "High") box.style.background = "#fd7e14";
        else box.style.background = "#dc3545";

        updateRiskChart(data.score);

        if (data.level === "Critical") {
            showAlertToast("⚠ CRITICAL THREAT DETECTED!");
            document.getElementById("alertSound").play();
        }
    });
}

/* ------------------------- UPDATE LOG TABLE ------------------------- */
function updateLogs() {
    fetch("/api/logs")
    .then(r => r.json())
    .then(data => {
        let table = document.getElementById("logTable");
        table.innerHTML = "";

        data.slice(-20).reverse().forEach(log => {
            table.innerHTML += `
                <tr>
                    <td>${log.timestamp}</td>
                    <td>${log.message}</td>
                    <td>${log.score}</td>
                </tr>
            `;
        });
    });
}

/* ------------------------- DOWNLOAD CSV ------------------------- */
function downloadCSV() {
    fetch("/api/logs")
    .then(r => r.json())
    .then(data => {
        let csv = "timestamp,message,score\n";

        data.forEach(d => {
            csv += `${d.timestamp},"${d.message}",${d.score}\n`;
        });

        const blob = new Blob([csv], { type: "text/csv" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = "event_logs.csv";
        link.click();
    });
}

/* ------------------------- AUTO REFRESH ------------------------- */
setInterval(() => {
    updateRisk();
    updateLogs();
    updateSystemHealth();
}, 3000);

updateRisk();
updateLogs();
updateSystemHealth();

</script>
</body>
</html>
